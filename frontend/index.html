<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SSC Result Checker | HSC Stack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Space Grotesk", "sans-serif"],
          },
          colors: {
            surface: "#0a0a0c",
            surfaceElevated: "#121214",
          },
          animation: {
            blob: "blob 10s infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(40px, -60px) scale(1.1)" },
              "66%": { transform: "translate(-30px, 30px) scale(0.95)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
          },
        },
      },
    };
  </script>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xmv44td477");
</script>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden bg-surface selection:bg-emerald-500 selection:text-black">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
